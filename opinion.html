<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | CUTE DOGHOME</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="contents">
        <header id="headcontainer">
            <h1>お問い合わせ</h1>
            <ul>
                <li class="homeicon"><a href="index.html"><img src="images/navtest0.png" width="80" height="60" alt="子犬たち"></a></li>
                <li><a href="info.html"><img src="images/navtest1.png" width="180" height="60" alt="子犬たち"></a></li>
                <li><a href="access.html"><img src="images/navtest2.png" width="180" height="60" alt="私たちの家"></a></li>
                <li><a href="opinion.html"><img src="images/navtest3.png" width="180" height="60" alt="お問い合わせ"></a></li>
            </ul>
        </header>

        <main id="opinionmain">
            <div class="form-container">
                <h2>お問い合わせ</h2>
                <p class="form-word">子犬に関するご質問や、見学のご予約など、お気軽にお問い合わせください。</p>
                
                <form action="#" method="post">
                    <dl class="form-list">
                        <dt><label for="username">お名前</label></dt>
                        <dd><input type="text" name="username" id="username" placeholder="山田 太郎" required></dd>
                        
                        <dt><label for="message">お問い合わせ内容</label></dt>
                        <dd><textarea name="message" id="message" placeholder="ご質問や見学希望日時などをご記入ください" required></textarea></dd>

                        <dt>確認</dt>
                        <dd class="checkbox-area">
                            <label>
                                <input type="checkbox" name="privacy" value="1" required>
                                <span>入力内容を確認しました</span>
                            </label>
                        </dd>
                    </dl>

                    <div class="form-submit">
                        <input type="submit" value="メッセージを送信する">
                    </div>
                </form>
            </div>
        </main>

        <aside id="sub">
            <ul>
                <li><a href="access.html"><img src="images/navtest2.png" alt="私たちの家"></a></li>
                <li><a href="opinion.html"><img src="images/navtest3.png" alt="お問い合わせ"></a></li>
            </ul>
        </aside>
    </div>

    <footer>
        <p><small>Copyright 2026 CUTE DOGHOME All rights reserved.</small></p>
    </footer>
</body>
</html>
